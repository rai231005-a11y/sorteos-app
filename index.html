<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORTEOS ⚡ PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
.header{
background:black;
padding:15px;
text-align:center;
font-size:30px;
font-weight:bold;
color:#ffd700;
}

/* GRID */
.container{
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
padding:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:6px;
}

.cell{
padding:12px;
border-radius:10px;
text-align:center;
cursor:pointer;
font-weight:bold;
background:#1e293b;
}

.libre{background:white;color:black;}
.apartado{background:#facc15;color:black;}
.pagado{background:#22c55e;}
.ganador{background:#ffd700;color:black;}

/* PANEL */
.panel{
background:#111827;
padding:10px;
border-radius:10px;
}

input, textarea{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.lista{
font-size:14px;
}

.item{
display:flex;
justify-content:space-between;
border-bottom:1px solid #333;
padding:5px;
}

</style>
</head>

<body>

<div class="header">SORTEOS ⚡</div>

<div class="container">

<div>
<div class="grid" id="grid"></div>
</div>

<div class="panel">

<input id="titulo" placeholder="Nombre del sorteo">
<input id="costo" placeholder="Costo">
<textarea id="desc" placeholder="Descripción"></textarea>

<button onclick="ganador()">🏆 Ganador</button>
<button onclick="exportarPremium()">📤 Exportar PRO</button>
<button onclick="reset()">♻️ Reset</button>

<div class="lista" id="lista"></div>

</div>

</div>

<script>

let data=JSON.parse(localStorage.getItem("sorteo"))||{};

function init(){
crear();
render();
}

function crear(){
let g=document.getElementById("grid");
g.innerHTML="";

for(let i=0;i<100;i++){
let d=document.createElement("div");
d.className="cell libre";
d.innerText=i;

d.onclick=()=>{
let nombre=prompt("Nombre(s)");

if(nombre){

let estado=prompt("1=Apartado / 2=Pagado");

data[i]={
nombre,
estado:estado=="2"?"pagado":"apartado"
};

guardar();
render();
}
};

g.appendChild(d);
}
}

function render(){

let lista=document.getElementById("lista");
lista.innerHTML="";

document.querySelectorAll(".cell").forEach((c,i)=>{

c.className="cell libre";
c.innerText=i;

if(data[i]){

if(data[i].estado=="pagado"){
c.classList.add("pagado");
}else{
c.classList.add("apartado");
}

c.innerHTML=i+"<br>"+data[i].nombre;

let emoji = data[i].nombre.includes("/") ? "🐮" : "";

lista.innerHTML+=`
<div class="item">
<span>${emoji} ${data[i].nombre}</span>
<span>${i}</span>
</div>
`;

}

});

}

function guardar(){
localStorage.setItem("sorteo",JSON.stringify(data));
}

function reset(){
data={};
guardar();
location.reload();
}

function ganador(){
let keys=Object.keys(data);
let g=keys[Math.floor(Math.random()*keys.length)];

document.querySelectorAll(".cell")[g].classList.add("ganador");
}

/* EXPORT PRO CORRECTO */

function exportarPremium(){

let html=`
<div style="background:black;color:white;padding:30px;width:900px;font-family:Arial;">

<h1 style="text-align:center;color:#ffd700;">SORTEOS ⚡</h1>

<p style="text-align:center;">Participa. Confía. Gana.</p>

<div style="text-align:center;margin:10px;">
💲 COSTO: $${document.getElementById("costo").value||0}
</div>

<div style="
display:grid;
grid-template-columns:repeat(10,1fr);
gap:5px;
background:#111;
padding:10px;
border-radius:15px;
">

${generarTabla()}

</div>

<div style="
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
">
<span style="background:white;color:black;padding:5px;">Disponible</span>
<span style="background:#facc15;padding:5px;">Apartado</span>
<span style="background:#22c55e;padding:5px;">Pagado</span>
</div>

</div>
`;

let div=document.createElement("div");
div.innerHTML=html;
document.body.appendChild(div);

html2canvas(div).then(canvas=>{
let a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="sorteo_pro.png";
a.click();
div.remove();
});
}

function generarTabla(){

let html="";

for(let i=0;i<100;i++){

let style="background:#fff;color:#000;";
let txt=i;

if(data[i]){

if(data[i].estado=="pagado"){
style="background:#22c55e;color:#fff;";
}else{
style="background:#facc15;color:#000;";
}

let emoji = data[i].nombre.includes("/") ? "🐮 " : "";

txt=i+"<br>"+emoji+data[i].nombre;
}

html+=`<div style="padding:10px;border-radius:8px;text-align:center;${style}">${txt}</div>`;
}

return html;
}

init();

</script>

</body>
</html>
