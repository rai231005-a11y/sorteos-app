<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORTEOS ⚡ PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#020617;
  color:white;
  text-align:center;
}

h1 {color:#38bdf8}

.grid {
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:8px;
  max-width:500px;
  margin:20px auto;
}

.cell {
  background:#111827;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  transition:.2s;
}

.cell:hover {transform:scale(1.05)}

.paid {
  background:#22c55e;
}

.input-list {
  max-width:500px;
  margin:auto;
}

.input-row {
  display:flex;
  margin:5px;
}

.input-row input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
}

.btn-pago {
  width:50px;
  margin-left:5px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:white;
  cursor:pointer;
}

.btn-pago.pagado {
  background:#22c55e;
}

.stats {
  margin:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>SORTEOS ⚡</h1>

<div class="stats" id="stats"></div>

<div class="grid" id="grid"></div>

<div class="input-list" id="inputs"></div>

<script>
let data = JSON.parse(localStorage.getItem("sorteo")) || {};

function save() {
  localStorage.setItem("sorteo", JSON.stringify(data));
}

function render() {
  const grid = document.getElementById("grid");
  const inputs = document.getElementById("inputs");
  grid.innerHTML = "";
  inputs.innerHTML = "";

  let total = 0;
  let pagados = 0;

  for (let i = 0; i < 100; i++) {

    if (!data[i]) data[i] = {nombre:"", pagado:false};

    // GRID
    let cell = document.createElement("div");
    cell.className = "cell";
    if (data[i].pagado) cell.classList.add("paid");

    cell.innerHTML = i + "<br>" + (data[i].nombre || "");

    cell.onclick = () => {
      let nombre = prompt("Nombre del participante:", data[i].nombre);
      if (nombre !== null) {
        data[i].nombre = nombre;
        save();
        render();
      }
    };

    grid.appendChild(cell);

    // INPUTS
    let row = document.createElement("div");
    row.className = "input-row";

    let input = document.createElement("input");
    input.value = data[i].nombre;
    input.placeholder = i;

    input.oninput = (e) => {
      data[i].nombre = e.target.value;
      save();
      render();
    };

    let btn = document.createElement("button");
    btn.className = "btn-pago";
    if (data[i].pagado) btn.classList.add("pagado");

    btn.innerHTML = "$";

    btn.onclick = () => {
      data[i].pagado = !data[i].pagado;
      save();
      render();
    };

    row.appendChild(input);
    row.appendChild(btn);
    inputs.appendChild(row);

    // STATS
    if (data[i].pagado) {
      pagados++;
      total += 100;
    }
  }

  document.getElementById("stats").innerHTML =
    `Pagados: ${pagados} | Total: $${total}`;
}

render();
</script>

</body>
</html>
