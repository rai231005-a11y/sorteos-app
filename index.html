<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SORTEOS ⚡ PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* HEADER */
.header{
background:black;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid gold;
}

.logo{
height:50px;
}

.title{
font-size:28px;
color:gold;
font-weight:bold;
}

/* PANEL */
.top{
padding:10px;
text-align:center;
}

.btn{
background:linear-gradient(45deg,#ffd700,#ff9900);
border:none;
padding:10px 15px;
border-radius:10px;
margin:5px;
cursor:pointer;
font-weight:bold;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:6px;
padding:10px;
}

.cell{
padding:12px;
border-radius:10px;
text-align:center;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

/* ESTADOS */
.libre{
background:#ffffff;
color:#000;
}

.apartado{
background:#facc15;
color:#000;
}

.pagado{
background:#16a34a;
color:white;
}

.ganador{
background:gold;
color:black;
}

/* INFO */
.info{
text-align:center;
margin-top:10px;
}

input{
padding:8px;
margin:5px;
border-radius:8px;
border:none;
}

/* EXPORT */
.export-box{
background:black;
color:white;
padding:30px;
font-family:Arial;
width:900px;
}

.gold{
color:gold;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
<div class="title">SORTEOS ⚡</div>
<img src="https://i.imgur.com/8Km9tLL.png" class="logo">
</div>

<div class="top">

<input id="titulo" placeholder="Nombre del sorteo">
<input id="costo" placeholder="Costo">

<br>

<button class="btn" onclick="ganador()">🏆 Ganador</button>
<button class="btn" onclick="exportar()">📤 Exportar PRO</button>
<button class="btn" onclick="reset()">♻️ Reset</button>

</div>

<div class="grid" id="grid"></div>

<div class="info">
⚪ Disponible | 🟡 Apartado | 🟢 Pagado
</div>

<script>

let data = JSON.parse(localStorage.getItem("sorteo")) || {}

function init(){
let grid=document.getElementById("grid")
grid.innerHTML=""

for(let i=0;i<100;i++){

let d=document.createElement("div")
d.className="cell libre"
d.innerText=i

d.onclick=()=>{

let nombre=prompt("Nombre")

if(nombre){

let tipo=prompt("1=Apartado / 2=Pagado")

data[i]={
nombre,
estado: tipo=="2"?"pagado":"apartado"
}

guardar()
render()

}

}

grid.appendChild(d)

}

render()

}

function render(){

document.querySelectorAll(".cell").forEach((c,i)=>{

c.className="cell libre"
c.innerText=i

if(data[i]){

c.classList.add(data[i].estado)

let emoji = data[i].nombre.includes("/") ? "🐮" : ""

c.innerHTML = i + "<br>" + emoji + data[i].nombre

}

})

}

function guardar(){
localStorage.setItem("sorteo",JSON.stringify(data))
}

function reset(){
localStorage.removeItem("sorteo")
location.reload()
}

function ganador(){

let keys=Object.keys(data)

if(keys.length===0) return

let g=keys[Math.floor(Math.random()*keys.length)]

document.querySelectorAll(".cell")[g].classList.add("ganador")

}

/* EXPORT PREMIUM REAL */

function exportar(){

let html=`
<div class="export-box">

<h1 class="gold" style="text-align:center;">SORTEOS ⚡</h1>

<p style="text-align:center;">Participa. Confía. Gana.</p>

<div style="text-align:center;margin:10px;">
🏆 1ER PREMIO: $5000  
🏆 2DO PREMIO: $2000  
</div>

<div style="text-align:center;margin:10px;">
💲 COSTO: $${document.getElementById("costo").value||0}
</div>

<div style="
display:grid;
grid-template-columns:repeat(10,1fr);
gap:5px;
padding:10px;
background:#111;
border-radius:10px;
">

${generarTabla()}

</div>

</div>
`

let div=document.createElement("div")
div.innerHTML=html
document.body.appendChild(div)

html2canvas(div).then(canvas=>{

let a=document.createElement("a")
a.href=canvas.toDataURL()
a.download="sorteo.png"
a.click()

div.remove()

})

}

function generarTabla(){

let html=""

for(let i=0;i<100;i++){

let style="background:#fff;color:#000"
let txt=i

if(data[i]){

if(data[i].estado=="pagado"){
style="background:#16a34a;color:#fff"
}else{
style="background:#facc15;color:#000"
}

let emoji = data[i].nombre.includes("/") ? "🐮 " : ""

txt=i+"<br>"+emoji+data[i].nombre

}

html+=`<div style="padding:10px;border-radius:8px;text-align:center;${style}">${txt}</div>`

}

return html

}

init()

</script>

</body>
</html>
