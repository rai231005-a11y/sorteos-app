<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORTEOS ⚡ ADMIN PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
:root{
  --bg:#020617; --card:#0b1220; --muted:#94a3b8;
  --primary:#38bdf8; --green:#22c55e; --yellow:#facc15; --red:#ef4444; --gold:#f59e0b;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:var(--bg);color:#fff}
header{padding:12px;text-align:center;border-bottom:1px solid #0f172a}
.titulo{font-size:22px;font-weight:bold;color:var(--primary)}
.slogan{font-size:12px;color:var(--muted)}

.layout{display:flex;min-height:100vh}
.sidebar{width:260px;background:#030712;border-right:1px solid #0f172a;padding:10px}
.sidebar h3{margin:6px 0 10px 0;color:#cbd5f5}
.sidebar button, .sidebar .itemS{
  width:100%;padding:8px;border-radius:8px;margin:4px 0;border:none;cursor:pointer;
}
.itemS{background:#0b1220;text-align:left}
.itemS.active{outline:2px solid var(--primary)}
.sidebar .danger{background:#1f0a0a}
.sidebar .primary{background:#0b2440}

.main{flex:1;padding:10px}
.topbar{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:8px}
.topbar button{padding:8px;border-radius:8px;border:none;cursor:pointer}

.panel{display:flex;gap:10px;flex-wrap:wrap}
.grid{
  display:grid;gap:6px;padding:8px;background:#020617;border-radius:12px;
}
.cell{
  background:#0b1220;border-radius:8px;padding:8px;text-align:center;font-size:12px;
  min-height:38px;display:flex;align-items:center;justify-content:center;flex-direction:column;
}
.libre{background:#0b1220}
.apartado{background:var(--yellow);color:#000}
.pagado{background:var(--green)}
.ganador{outline:3px solid gold;transform:scale(1.05)}

.lista{
  flex:1;min-width:260px;max-height:70vh;overflow:auto;background:#020617;border-radius:12px;padding:8px;
}
.item{display:flex;gap:6px;margin-bottom:6px}
.item input{flex:1;padding:6px;border-radius:6px;border:none}
.item button{padding:6px;border-radius:6px;border:none;cursor:pointer}

.stats{margin:8px 0;text-align:center;color:#fde68a}
.panelGan{margin:8px 0;text-align:center;color:gold}

.hidden{display:none}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:10px}
.modal .box{background:#020617;border:1px solid #0f172a;border-radius:12px;padding:12px;width:100%;max-width:520px}
.modal .box h3{margin-top:0}
.row{display:flex;gap:6px;flex-wrap:wrap}
.row input{flex:1;padding:6px;border-radius:6px;border:none}
.row button{padding:8px;border-radius:8px;border:none;cursor:pointer}

/* Boleto */
#boletoWrap{display:none;padding:20px;background:#000}
.ticket{
  max-width:420px;margin:auto;border-radius:20px;padding:16px;
  background:linear-gradient(180deg,#000,#111);border:2px solid gold;box-shadow:0 0 20px gold;
  text-align:center;color:#fff;
}
.ticket h2{color:gold;margin:4px 0}
.ticket .num{font-size:58px;color:var(--green);font-weight:bold}
.ticket .ok{background:var(--green);padding:8px;border-radius:10px;margin:10px 0;font-weight:bold}
.small{font-size:12px;color:#cbd5f5}

/* Login */
#login{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center}
#login .box{background:#020617;border:1px solid #0f172a;border-radius:12px;padding:16px;width:280px;text-align:center}
#login input{width:100%;padding:8px;border-radius:8px;border:none;margin:8px 0}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3>SORTEOS ⚡ ADMIN</h3>
    <div class="small">Ingresa PIN</div>
    <input id="pin" type="password" placeholder="PIN (1234)">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<header>
  <div class="titulo">SORTEOS ⚡</div>
  <div class="slogan">Admin Panel Pro</div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Sorteos</h3>
    <div id="listaSorteos"></div>
    <button class="primary" onclick="abrirModalNuevo()">➕ Nuevo sorteo</button>
    <button onclick="duplicar()">📄 Duplicar</button>
    <button class="danger" onclick="eliminar()">🗑️ Eliminar</button>
    <hr>
    <button onclick="exportar()">📤 Exportar tabla</button>
    <button onclick="resetear()">♻️ Reset actual</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button onclick="ganador()">🏆 1 Ganador</button>
      <button onclick="multi()">🥇🥈🥉 Multi</button>
      <button onclick="boleto()">🎟️ Boleto</button>
      <button onclick="config()">⚙️ Config</button>
    </div>

    <div id="stats" class="stats"></div>
    <div id="panelGan" class="panelGan"></div>

    <div class="panel">
      <div id="grid" class="grid"></div>
      <div id="lista" class="lista"></div>
    </div>
  </div>
</div>

<!-- MODAL CONFIG -->
<div id="modalConfig" class="modal">
  <div class="box">
    <h3>Configuración</h3>
    <div class="row">
      <input id="cfgNombre" placeholder="Nombre del sorteo">
      <input id="cfgCodigo" placeholder="Código (S-001)">
    </div>
    <div class="row">
      <input id="cfgRango" placeholder="Rango (00-99 / 1-200)">
      <input id="cfgPrecio" type="number" placeholder="Precio boleto">
    </div>
    <div class="row">
      <input id="cfgPremios" placeholder="Premios (1:$5000,2:$2000)">
    </div>
    <div class="row">
      <button onclick="guardarConfig()">Guardar</button>
      <button onclick="cerrarModal('modalConfig')">Cerrar</button>
    </div>
  </div>
</div>

<!-- MODAL NUEVO -->
<div id="modalNuevo" class="modal">
  <div class="box">
    <h3>Nuevo sorteo</h3>
    <div class="row">
      <input id="nuevoNombre" placeholder="Nombre">
      <input id="nuevoRango" placeholder="Rango (00-99)">
    </div>
    <div class="row">
      <button onclick="crearSorteo()">Crear</button>
      <button onclick="cerrarModal('modalNuevo')">Cerrar</button>
    </div>
  </div>
</div>

<!-- BOLETO -->
<div id="boletoWrap">
  <div class="ticket">
    <h2>SORTEOS ⚡</h2>
    <div class="small" id="tNombreS"></div>
    <div class="num" id="tNum"></div>
    <div id="tNom"></div>
    <div class="ok">✔ PAGADO</div>
    <div class="small" id="tFecha"></div>
    <div class="small" id="tPremios"></div>
    <p>¡Gracias por participar! ⚡</p>
  </div>
</div>

<script>
// ====== LOGIN ======
const ADMIN_PIN = "1234";
function login(){
  if(document.getElementById('pin').value===ADMIN_PIN){
    document.getElementById('login').style.display='none';
  }else alert('PIN incorrecto');
}

// ====== STORAGE ======
let DB = JSON.parse(localStorage.getItem('SORTEOS_DB')) || {
  sorteos:{},
  activo:null
};

function save(){ localStorage.setItem('SORTEOS_DB', JSON.stringify(DB)); }

// ====== HELPERS ======
function parseRango(r){
  // "00-99" o "1-200"
  let [a,b] = r.split('-').map(x=>x.trim());
  let start = parseInt(a,10), end = parseInt(b,10);
  let pad = a.length; // 2 para 00
  let arr=[];
  for(let i=start;i<=end;i++){
    let s = i.toString();
    if(pad>1) s = s.padStart(pad,'0');
    arr.push(s);
  }
  return arr;
}

// ====== SORTER MGMT ======
function renderListaS(){
  let cont = document.getElementById('listaSorteos');
  cont.innerHTML='';
  Object.keys(DB.sorteos).forEach(id=>{
    let it = document.createElement('div');
    it.className='itemS'+(DB.activo===id?' active':'');
    it.innerHTML = DB.sorteos[id].config.nombre || id;
    it.onclick=()=>{ DB.activo=id; save(); cargar(); renderListaS(); };
    cont.appendChild(it);
  });
}

function abrirModalNuevo(){ abrirModal('modalNuevo'); }
function crearSorteo(){
  let nombre = document.getElementById('nuevoNombre').value || 'SORTEO';
  let rango = document.getElementById('nuevoRango').value || '00-99';
  let id = 'S-'+Date.now();
  DB.sorteos[id]={
    config:{nombre,codigo:id,rango,precio:100,premios:"1:$5000,2:$2000"},
    data:{},
    winners:[]
  };
  DB.activo=id;
  save(); cerrarModal('modalNuevo'); cargar(); renderListaS();
}
function eliminar(){
  if(!DB.activo) return;
  if(confirm('Eliminar sorteo?')){
    delete DB.sorteos[DB.activo];
    DB.activo = Object.keys(DB.sorteos)[0] || null;
    save(); cargar(); renderListaS();
  }
}
function duplicar(){
  if(!DB.activo) return;
  let base = DB.sorteos[DB.activo];
  let id = 'S-'+Date.now();
  DB.sorteos[id] = JSON.parse(JSON.stringify(base));
  DB.sorteos[id].config.codigo = id;
  DB.activo=id; save(); cargar(); renderListaS();
}

// ====== CONFIG ======
function config(){
  if(!DB.activo) return;
  let c = DB.sorteos[DB.activo].config;
  document.getElementById('cfgNombre').value=c.nombre||'';
  document.getElementById('cfgCodigo').value=c.codigo||'';
  document.getElementById('cfgRango').value=c.rango||'00-99';
  document.getElementById('cfgPrecio').value=c.precio||100;
  document.getElementById('cfgPremios').value=c.premios||'';
  abrirModal('modalConfig');
}
function guardarConfig(){
  let c = DB.sorteos[DB.activo].config;
  c.nombre = document.getElementById('cfgNombre').value;
  c.codigo = document.getElementById('cfgCodigo').value;
  c.rango = document.getElementById('cfgRango').value;
  c.precio = parseFloat(document.getElementById('cfgPrecio').value)||100;
  c.premios = document.getElementById('cfgPremios').value;
  save(); cerrarModal('modalConfig'); cargar(); renderListaS();
}

// ====== UI CORE ======
function cargar(){
  let grid = document.getElementById('grid');
  let lista = document.getElementById('lista');
  let stats = document.getElementById('stats');
  let panel = document.getElementById('panelGan');

  grid.innerHTML=''; lista.innerHTML=''; panel.innerHTML='';

  if(!DB.activo){ stats.innerHTML='Crea un sorteo'; return; }

  let S = DB.sorteos[DB.activo];
  let nums = parseRango(S.config.rango||'00-99');

  // ajustar columnas dinámicas
  let cols = Math.min(10, Math.ceil(Math.sqrt(nums.length)));
  grid.style.gridTemplateColumns = `repeat(${cols},1fr)`;

  nums.forEach(n=>{
    if(!S.data[n]) S.data[n]={nombre:"",estado:"libre"};

    // cell
    let c = document.createElement('div');
    c.id='c'+n; c.className='cell';
    grid.appendChild(c);

    // list item
    let it = document.createElement('div'); it.className='item';
    let inp = document.createElement('input');
    inp.placeholder=n; inp.value=S.data[n].nombre||'';
    inp.oninput=()=>{
      S.data[n].nombre=inp.value;
      S.data[n].estado = inp.value ? 'apartado':'libre';
      update(n);
    };
    let b = document.createElement('button'); b.innerHTML='💲';
    b.onclick=()=>{
      if(S.data[n].nombre){
        S.data[n].estado='pagado'; update(n);
      }
    };
    it.appendChild(inp); it.appendChild(b); lista.appendChild(it);

    update(n);
  });

  statsUpdate();
  save();
}

function update(n){
  let S = DB.sorteos[DB.activo];
  let c = document.getElementById('c'+n);
  if(!c) return;

  c.className='cell '+S.data[n].estado;

  let txt=n;
  if(S.data[n].nombre){
    txt+="<br>"+S.data[n].nombre;
    if(S.data[n].nombre.includes('/')) txt+=" 🐮";
  }
  c.innerHTML=txt;

  if(S.winners.includes(n)) c.classList.add('ganador');

  save(); statsUpdate();
}

// ====== STATS ======
function statsUpdate(){
  if(!DB.activo) return;
  let S = DB.sorteos[DB.activo];
  let p = Object.values(S.data).filter(x=>x.estado==='pagado').length;
  let total = p * (S.config.precio||100);
  let premios = S.config.premios||'1:$5000,2:$2000';
  // estimación simple: suma de premios numéricos
  let sumPrem = (premios.match(/\d+(?:\.\d+)?/g)||[]).map(Number).reduce((a,b)=>a+b,0);
  let gan = total - sumPrem;

  document.getElementById('stats').innerHTML =
    `Pagados: ${p} | Total: $${total} | Premios: $${sumPrem} | Ganancia: $${gan}`;
}

// ====== GANADORES ======
function ganador(){
  if(!DB.activo) return;
  let S = DB.sorteos[DB.activo];
  let p = Object.keys(S.data).filter(n=>S.data[n].estado==='pagado');
  if(!p.length) return alert('Sin pagados');

  let w = p[Math.floor(Math.random()*p.length)];
  S.winners=[w];
  document.getElementById('panelGan').innerHTML=`🏆 ${w} - ${S.data[w].nombre}`;
  update(w);
}
function multi(){
  if(!DB.activo) return;
  let S = DB.sorteos[DB.activo];
  let p = Object.keys(S.data).filter(n=>S.data[n].estado==='pagado');
  if(p.length<3) return alert('Mínimo 3 pagados');

  S.winners=[];
  for(let i=0;i<3;i++){
    let w = p[Math.floor(Math.random()*p.length)];
    S.winners.push(w);
  }
  document.getElementById('panelGan').innerHTML =
    `🥇 ${S.winners[0]}<br>🥈 ${S.winners[1]}<br>🥉 ${S.winners[2]}`;
  S.winners.forEach(update);
}

// ====== BOLETO ======
function boleto(){
  if(!DB.activo) return;
  let S = DB.sorteos[DB.activo];
  let p = Object.keys(S.data).filter(n=>S.data[n].estado==='pagado');
  if(!p.length) return alert('Sin pagados');

  let n = p[p.length-1];
  document.getElementById('tNombreS').innerText = S.config.nombre||'SORTEO';
  document.getElementById('tNum').innerText = n;
  document.getElementById('tNom').innerText = S.data[n].nombre;
  document.getElementById('tFecha').innerText = new Date().toLocaleString();
  document.getElementById('tPremios').innerText = S.config.premios||'';

  let wrap = document.getElementById('boletoWrap');
  wrap.style.display='block';

  html2canvas(wrap).then(c=>{
    let a=document.createElement('a');
    a.download='boleto.png';
    a.href=c.toDataURL();
    a.click();
    wrap.style.display='none';
  });
}

// ====== EXPORT / RESET ======
function exportar(){
  html2canvas(document.body).then(c=>{
    let a=document.createElement('a');
    a.download='tabla.png';
    a.href=c.toDataURL();
    a.click();
  });
}
function resetear(){
  if(!DB.activo) return;
  if(confirm('Resetear sorteo actual?')){
    DB.sorteos[DB.activo].data={};
    DB.sorteos[DB.activo].winners=[];
    save(); cargar();
  }
}

// ====== MODALS ======
function abrirModal(id){ document.getElementById(id).style.display='flex'; }
function cerrarModal(id){ document.getElementById(id).style.display='none'; }

// ====== INIT ======
if(!DB.activo && Object.keys(DB.sorteos).length){
  DB.activo = Object.keys(DB.sorteos)[0];
}
renderListaS();
cargar();
</script>

</body>
</html>
