<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORTEOS ⚡ PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
:root{
--bg:#020617;
--card:#0b1220;
--primary:#38bdf8;
--green:#22c55e;
--yellow:#facc15;
--red:#ef4444;
--gold:#f59e0b;
}
body{
margin:0;
font-family:Arial;
background:var(--bg);
color:#fff;
}
header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
color:var(--primary);
}
.container{
display:flex;
}
.sidebar{
width:220px;
background:#050b18;
padding:15px;
}
.sidebar button{
width:100%;
margin-bottom:10px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}
.main{
flex:1;
padding:20px;
}
.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:6px;
max-width:500px;
}
.cell{
background:#111827;
padding:10px;
text-align:center;
border-radius:6px;
cursor:pointer;
font-size:12px;
}
.paid{background:var(--green);}
.reserved{background:var(--yellow);color:#000;}
.inputs{
margin-top:20px;
max-height:300px;
overflow:auto;
}
.inputs div{
display:flex;
margin-bottom:5px;
}
.inputs input{
flex:1;
padding:8px;
border-radius:6px;
border:none;
}
.pay{
width:40px;
background:#222;
border:none;
color:white;
}
.pay.active{
background:var(--green);
}
.top{
margin-bottom:15px;
}
button{
cursor:pointer;
}
.ticket{
background:black;
color:white;
padding:20px;
border-radius:20px;
width:300px;
margin:auto;
}
.hidden{display:none;}
</style>
</head>

<body>

<header>SORTEOS ⚡ Admin Pro</header>

<div id="login">
<div style="display:flex;justify-content:center;margin-top:100px;">
<div style="background:#0b1220;padding:30px;border-radius:12px;">
<h2>Ingreso ADMIN</h2>
<input id="pin" placeholder="PIN (1234)">
<br><br>
<button onclick="login()">Entrar</button>
</div>
</div>
</div>

<div id="app" class="hidden">
<div class="container">

<div class="sidebar">
<button onclick="nuevo()">+ Nuevo sorteo</button>
<button onclick="reset()">Reset</button>
<button onclick="exportar()">Exportar</button>
<button onclick="ganador()">Ganador</button>
</div>

<div class="main">

<div class="top">
Pagados: <span id="pagados">0</span> |
Total: $<span id="total">0</span>
</div>

<div class="grid" id="grid"></div>

<div class="inputs" id="inputs"></div>

</div>
</div>
</div>

<div id="ticket" class="hidden"></div>

<script>

let precio = 100;
let data = JSON.parse(localStorage.getItem("sorteo")) || {};

function login(){
if(document.getElementById("pin").value==="1234"){
document.getElementById("login").style.display="none";
document.getElementById("app").classList.remove("hidden");
init();
}
}

function init(){
crearGrid();
crearInputs();
render();
}

function crearGrid(){
let grid=document.getElementById("grid");
grid.innerHTML="";
for(let i=0;i<100;i++){
let d=document.createElement("div");
d.className="cell";
d.id="c"+i;
d.innerHTML=i;
grid.appendChild(d);
}
}

function crearInputs(){
let inputs=document.getElementById("inputs");
inputs.innerHTML="";
for(let i=0;i<100;i++){
let div=document.createElement("div");

let inp=document.createElement("input");
inp.placeholder=i;
inp.value=data[i]?.nombre || "";
inp.oninput=()=>{
data[i]={...data[i],nombre:inp.value};
guardar();
render();
};

let pay=document.createElement("button");
pay.innerHTML="$";
pay.className="pay";
pay.onclick=()=>{
data[i]=data[i]||{};
data[i].pagado=!data[i].pagado;
if(data[i].pagado) generarTicket(i);
guardar();
render();
};

div.appendChild(inp);
div.appendChild(pay);
inputs.appendChild(div);
}
}

function render(){
let pagados=0;
let total=0;

for(let i=0;i<100;i++){
let c=document.getElementById("c"+i);
c.className="cell";

let val=data[i];

if(val?.nombre){
c.innerHTML=i+"<br>"+val.nombre;
}

if(val?.pagado){
c.classList.add("paid");
pagados++;
total+=precio;
}
}

document.getElementById("pagados").innerText=pagados;
document.getElementById("total").innerText=total;
}

function guardar(){
localStorage.setItem("sorteo",JSON.stringify(data));
}

function reset(){
localStorage.clear();
location.reload();
}

function nuevo(){
data={};
guardar();
location.reload();
}

function ganador(){
let keys=Object.keys(data).filter(k=>data[k].pagado);
let g=keys[Math.floor(Math.random()*keys.length)];
alert("Ganador: "+g);
}

function generarTicket(num){
let t=document.getElementById("ticket");
let d=data[num];

t.innerHTML=`
<div class="ticket">
<h2>SORTEOS ⚡</h2>
<h3>Número: ${num}</h3>
<p>${d.nombre}</p>
<p>PAGADO ✅</p>
</div>
`;

t.classList.remove("hidden");

html2canvas(t).then(canvas=>{
let link=document.createElement("a");
link.download="boleto.png";
link.href=canvas.toDataURL();
link.click();
});
}

function exportar(){
html2canvas(document.getElementById("grid")).then(canvas=>{
let link=document.createElement("a");
link.download="tabla.png";
link.href=canvas.toDataURL();
link.click();
});
}

</script>

</body>
</html>
