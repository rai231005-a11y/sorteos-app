<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SORTEOS ⚡ PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

/* BASE */
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
.header{
background:black;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

/* PANEL */
.container{
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
padding:15px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:6px;
}

.cell{
background:#1e293b;
padding:12px;
border-radius:8px;
text-align:center;
cursor:pointer;
font-weight:bold;
}

.libre{background:white;color:black;}
.apartado{background:#999;}
.pagado{background:#22c55e;}
.ganador{background:#ffd700;color:black;}

/* LISTA */
.lista{
background:#111827;
padding:10px;
border-radius:10px;
}

.item{
display:flex;
justify-content:space-between;
border-bottom:1px solid #333;
padding:6px;
}

/* BOTONES */
button{
padding:10px;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
}

/* CONFIG */
.config{
background:#111827;
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="header">SORTEOS ⚡ ADMIN PRO</div>

<div class="container">

<div>
<div class="grid" id="grid"></div>
</div>

<div>

<div class="config">
<h3>Configuración</h3>
<input id="titulo" placeholder="Nombre del sorteo"><br><br>
<input id="costo" placeholder="Costo"><br><br>
<textarea id="desc" placeholder="Descripción"></textarea>
</div>

<br>

<div class="lista" id="lista"></div>

<br>

<button onclick="ganador()">🏆 Ganador</button>
<button onclick="exportarPRO()">📤 Exportar PRO</button>
<button onclick="reset()">♻️ Reset</button>

</div>

</div>

<script>

let data=JSON.parse(localStorage.getItem("sorteo"))||{};

function init(){
crear();
render();
}

function crear(){
let g=document.getElementById("grid");
g.innerHTML="";

for(let i=0;i<100;i++){
let d=document.createElement("div");
d.className="cell libre";
d.innerText=i;

d.onclick=()=>{
let nombre=prompt("Nombre(s)");

if(nombre){

let estado=prompt("1=Apartado / 2=Pagado");

data[i]={
nombre,
estado:estado=="2"?"pagado":"apartado"
};

guardar();
render();
}
};

g.appendChild(d);
}
}

function render(){

let lista=document.getElementById("lista");
lista.innerHTML="";

document.querySelectorAll(".cell").forEach((c,i)=>{

c.className="cell libre";
c.innerText=i;

if(data[i]){

c.classList.remove("libre");

if(data[i].estado=="pagado"){
c.classList.add("pagado");
}else{
c.classList.add("apartado");
}

c.innerHTML=i+"<br>"+data[i].nombre;

lista.innerHTML+=`
<div class="item">
<span>${data[i].nombre}</span>
<span>${i}</span>
</div>
`;

}

});

}

function guardar(){
localStorage.setItem("sorteo",JSON.stringify(data));
}

function reset(){
data={};
guardar();
location.reload();
}

function ganador(){
let keys=Object.keys(data);
let g=keys[Math.floor(Math.random()*keys.length)];

document.querySelectorAll(".cell")[g].classList.add("ganador");
}

/* EXPORT PRO (como imagen premium) */

function exportarPRO(){

let html=`
<div style="background:black;color:white;padding:20px;width:800px;font-family:Arial;">

<h1 style="text-align:center;">${document.getElementById("titulo").value||"SORTEO"}</h1>

<p style="text-align:center;">${document.getElementById("desc").value||""}</p>

<div style="text-align:center;margin:10px;">Costo: $${document.getElementById("costo").value||0}</div>

<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:5px;">
${generarTablaExport()}
</div>

<div style="margin-top:20px;text-align:center;">
<span style="background:white;color:black;padding:5px;">Disponible</span>
<span style="background:#999;padding:5px;">Apartado</span>
<span style="background:#22c55e;padding:5px;">Pagado</span>
</div>

</div>
`;

let div=document.createElement("div");
div.innerHTML=html;
document.body.appendChild(div);

html2canvas(div).then(canvas=>{
let a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="sorteo.png";
a.click();
div.remove();
});
}

function generarTablaExport(){

let html="";

for(let i=0;i<100;i++){

let style="background:white;color:black;";
let txt=i;

if(data[i]){
if(data[i].estado=="pagado"){
style="background:#22c55e;color:white;";
}else{
style="background:#999;color:black;";
}
txt=i+"<br>"+data[i].nombre;
}

html+=`<div style="padding:10px;border-radius:8px;text-align:center;${style}">${txt}</div>`;
}

return html;
}

init();

</script>

</body>
</html>
