<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORTEOS ⚡ PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

/* HEADER */
.header{
background:linear-gradient(90deg,#000,#1a1a1a);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid gold;
}

.logo{
font-size:40px;
font-weight:bold;
color:white;
}

.logo span{
color:gold;
}

.menu button{
margin-left:10px;
padding:10px;
border-radius:10px;
border:none;
background:#222;
color:white;
}

/* LAYOUT */
.container{
display:flex;
padding:15px;
gap:15px;
}

/* TABLA */
.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:6px;
background:#1a1a1a;
padding:10px;
border-radius:15px;
}

.cell{
background:#e5e5e5;
color:black;
padding:10px;
border-radius:8px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.paid{
background:#1f7a3a;
color:white;
}

.winner{
background:gold;
color:black;
}

/* LISTA */
.lista{
background:#1a1a1a;
padding:15px;
border-radius:15px;
width:250px;
}

.lista h3{
margin-top:0;
}

.item{
display:flex;
justify-content:space-between;
padding:5px 0;
border-bottom:1px solid #333;
}

/* GANADOR */
.ganador{
background:linear-gradient(#000,#222);
border:2px solid gold;
border-radius:20px;
padding:20px;
text-align:center;
width:300px;
}

.ganador h2{
color:gold;
}

/* CONFIG */
.footer{
background:#1a1a1a;
padding:15px;
margin:15px;
border-radius:15px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">sorteos <span>⚡</span></div>

<div class="menu">
<button onclick="nuevo()">Nuevo</button>
<button onclick="exportar()">Exportar</button>
<button onclick="ganador()">Ganador</button>
</div>
</div>

<div class="container">

<div>
<div class="grid" id="grid"></div>
</div>

<div class="lista">
<h3>Lista</h3>
<div id="lista"></div>
</div>

<div class="ganador" id="ganadorBox">
<h2>GANADOR</h2>
<p id="ganadorNombre">---</p>
<p id="ganadorNumero">---</p>
</div>

</div>

<div class="footer">
<div>
Costo: $<input id="costo" value="100">
</div>

<div>
Premios:
<input value="5000">
<input value="2000">
</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("sorteo")) || {};
let costo = 100;

function init(){
crearGrid();
render();
}

function crearGrid(){
let g=document.getElementById("grid");
g.innerHTML="";

for(let i=0;i<100;i++){

let d=document.createElement("div");
d.className="cell";
d.innerHTML=i;

d.onclick=()=>{
let nombre=prompt("Nombre:");

if(nombre){
data[i]={nombre:nombre,pagado:true};
guardar();
render();
}
};

g.appendChild(d);
}
}

function render(){

let lista=document.getElementById("lista");
lista.innerHTML="";

document.querySelectorAll(".cell").forEach((c,i)=>{

c.className="cell";

if(data[i]){
c.innerHTML=i+"<br>"+data[i].nombre;
c.classList.add("paid");

lista.innerHTML+=`
<div class="item">
<span>${data[i].nombre}</span>
<span>${i}</span>
</div>
`;
}

});

}

function guardar(){
localStorage.setItem("sorteo",JSON.stringify(data));
}

function nuevo(){
data={};
guardar();
location.reload();
}

function ganador(){

let keys=Object.keys(data);

let g=keys[Math.floor(Math.random()*keys.length)];

document.getElementById("ganadorNombre").innerText=data[g].nombre;
document.getElementById("ganadorNumero").innerText=g;

document.querySelectorAll(".cell")[g].classList.add("winner");

}

function exportar(){
html2canvas(document.body).then(canvas=>{
let link=document.createElement("a");
link.download="sorteo.png";
link.href=canvas.toDataURL();
link.click();
});
}

init();

</script>

</body>
</html>
