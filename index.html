<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORTEOS ⚡ PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {margin:0;font-family:Arial;background:#020617;color:white;}
header{text-align:center;padding:15px;color:#38bdf8;font-size:24px;}

.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;max-width:500px;margin:20px auto;}
.cell{background:#0f172a;padding:12px;border-radius:10px;cursor:pointer;}
.cell.paid{background:#22c55e;color:black;}

.input-list{max-width:500px;margin:auto;}
.row{display:flex;margin:5px;}
.row input{flex:1;padding:10px;border-radius:8px;border:none;}

.btn{width:50px;margin-left:5px;border:none;border-radius:8px;background:#1f2937;color:white;}
.btn.pagado{background:#22c55e;}

.stats{text-align:center;margin:10px;color:#fde68a;}
</style>
</head>

<body>

<header>SORTEOS ⚡</header>

<div class="stats" id="stats"></div>

<div class="grid" id="grid"></div>

<div class="input-list" id="inputs"></div>

<script>

// ================= CONFIG =================
const CONFIG = {
  nombre: "SORTEO ESPECIAL",
  codigo: "S-001",
  premios: ["1er Lugar $5000","2do Lugar $2000"],
  logo: "https://upload.wikimedia.org/wikipedia/commons/3/3f/Logo_placeholder.png"
};

// ================= DATA =================
let data = JSON.parse(localStorage.getItem("sorteo")) || {};

function save(){localStorage.setItem("sorteo",JSON.stringify(data));}

// ================= BOLETO =================
function boleto(num){

if(!data[num] || !data[num].pagado)return;

let nombre=data[num].nombre;
let fecha=new Date().toLocaleString();

let div=document.createElement("div");

div.innerHTML=`
<div style="background:black;color:white;padding:20px;text-align:center;font-family:Arial;">
<div style="max-width:320px;margin:auto;padding:20px;border-radius:20px;background:#000;border:2px solid gold;box-shadow:0 0 20px gold;">

<img src="${CONFIG.logo}" style="width:80px;">

<h2 style="color:gold;">SORTEOS ⚡</h2>

<h3>${CONFIG.nombre}</h3>

<div style="font-size:60px;color:#22c55e;">${num}</div>

<p><b>${nombre}</b></p>

<div style="background:#22c55e;padding:10px;border-radius:10px;">✔ PAGADO</div>

<p>${fecha}</p>

${CONFIG.premios.map(p=>`<p>${p}</p>`).join("")}

<p><b>${CONFIG.codigo}</b></p>

</div>
</div>
`;

document.body.appendChild(div);

html2canvas(div).then(c=>{
let a=document.createElement("a");
a.download="boleto.png";
a.href=c.toDataURL();
a.click();

div.remove();

// WHATSAPP
let msg="🎟️ Tu boleto está listo - SORTEOS ⚡";
window.open("https://wa.me/?text="+encodeURIComponent(msg));
});

}

// ================= RENDER =================
function render(){

let grid=document.getElementById("grid");
let inputs=document.getElementById("inputs");

grid.innerHTML="";
inputs.innerHTML="";

let pagados=0,total=0;

for(let i=0;i<100;i++){

if(!data[i])data[i]={nombre:"",pagado:false};

// GRID
let cell=document.createElement("div");
cell.className="cell";

if(data[i].pagado)cell.classList.add("paid");

cell.innerHTML=i+"<br>"+(data[i].nombre||"");

cell.onclick=()=>{
let nombre=prompt("Nombre:",data[i].nombre);
if(nombre!==null){
data[i].nombre=nombre;
save();
render();
}
};

grid.appendChild(cell);

// INPUT
let row=document.createElement("div");
row.className="row";

let input=document.createElement("input");
input.value=data[i].nombre;
input.placeholder=i;

input.oninput=e=>{
data[i].nombre=e.target.value;
save();
render();
};

let btn=document.createElement("button");
btn.className="btn";
btn.innerHTML="$";

if(data[i].pagado)btn.classList.add("pagado");

btn.onclick=()=>{
data[i].pagado=!data[i].pagado;
save();
render();

// 🔥 AUTO BOLETO
if(data[i].pagado) boleto(i);

};

row.appendChild(input);
row.appendChild(btn);
inputs.appendChild(row);

if(data[i].pagado){
pagados++;
total+=100;
}

}

document.getElementById("stats").innerHTML=`Pagados: ${pagados} | Total: $${total}`;
}

render();

</script>

</body>
</html>
