<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORTEOS ⚡ PRO</title>

<link rel="stylesheet" href="style.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

<div id="app">

<!-- HEADER -->
<header>
  <img src="assets/logo.png" class="logo">
  <h1>SORTEOS ⚡</h1>
</header>

<!-- HOME -->
<div id="home" class="screen active">
  <h2>Selecciona tipo de sorteo</h2>

  <div class="menu">
    <button onclick="crearSorteo('loteria')">Lotería 00–99</button>
    <button onclick="crearSorteo('ruleta')">Ruleta</button>
    <button onclick="crearSorteo('cartas')">Cartas</button>
  </div>
</div>

<!-- PANEL -->
<div id="panel" class="screen">

  <input id="nombre" placeholder="Nombre participante">

  <div class="acciones">
    <button onclick="setModo('apartado')">Apartar</button>
    <button onclick="setModo('pagado')">Pagado</button>
    <button onclick="exportar()">Exportar</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="side">
    <h3>Participantes</h3>
    <div id="lista"></div>
  </div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
