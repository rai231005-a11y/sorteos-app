<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORTEOS ⚡</title>

<link rel="stylesheet" href="style.css">
<script defer src="app.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

<body>

<header class="header">
  <div class="logo-area">
    <!-- CAMBIA ESTA URL POR TU LOGO -->
    <img src="https://i.imgur.com/8Km9tLL.png">
    <span>RAI HERNÁNDEZ</span>
  </div>

  <div class="menu">
    <button onclick="nuevo()">Nuevo</button>
    <button onclick="exportar()">Exportar</button>
    <button onclick="ganador()">Ganador</button>
  </div>
</header>

<section class="top">
  <h1>SORTEOS ⚡</h1>
  <p>Participa. Confía. Gana.</p>

  <div class="config">
    <input id="titulo" placeholder="Nombre del sorteo">
    <input id="costo" placeholder="Costo">
    <input id="p1" placeholder="1er premio">
    <input id="p2" placeholder="2do premio">
    <textarea id="desc" placeholder="Descripción"></textarea>
  </div>
</section>

<main>
  <div class="grid" id="grid"></div>

  <div class="side">
    <h3>Participantes</h3>
    <div id="lista"></div>

    <h3>Ganador</h3>
    <div id="ganadorBox"></div>
  </div>
</main>

</body>
</html>
